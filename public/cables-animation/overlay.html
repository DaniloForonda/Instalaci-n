<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <title>Final Animation</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        canvas {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            outline: 0;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex="-1"></canvas>

    <script type="text/javascript" src="js/cables.js"></script>
    <script type="text/javascript" src="js/ops.js"></script>
    <script type="text/javascript" src="js/cgl.js"></script>
    <script type="text/javascript" src="js/webaudio.js"></script>

    <script type="text/javascript">
        function showError(errId, errMsg) {}

        function patchInitialized(patch) {}

        function patchFinishedLoading(patch) {}

        document.addEventListener("CABLES.jsLoaded", function () {
            CABLES.patch = new CABLES.Patch({
                patchFile: "js/Final_Animation.json",
                prefixAssetPath: "assets/",
                assetPath: "assets/",
                jsPath: "js/",
                glCanvasId: "glcanvas",
                glCanvasResizeToWindow: true,
                onError: showError,
                onPatchLoaded: patchInitialized,
                onFinishedLoading: patchFinishedLoading,
                canvas: { alpha: true, premultipliedAlpha: true },
            });
        });

        document.getElementById("glcanvas").addEventListener(
            "touchmove",
            (e) => {
                e.preventDefault();
            },
            false,
        );
    </script>
</body>
</html>
